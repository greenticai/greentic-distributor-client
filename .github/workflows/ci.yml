name: CI
on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main
    with:
      run-semver-checks: true
      setup-script: |
        rg -n "greentic_interfaces::bindings::|greentic_interfaces_guest::bindings::|\bbindings::greentic::" src tests README.md \
          && { echo "ERROR: use canonical/facade modules instead of bindings::* paths"; exit 1; } \
          || true

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo package
        run: cargo package --locked -p greentic-distributor-client
