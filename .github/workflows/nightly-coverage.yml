name: Nightly Coverage

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main
    with:
      run-semver-checks: false

  coverage:
    name: Coverage Policy
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install coverage toolchain binaries
        run: |
          cargo binstall --no-confirm cargo-nextest cargo-llvm-cov
          # Force-reinstall greentic-dev: Swatinem/rust-cache restores
          # ~/.cargo/.crates2.json (binstall's tracking) but does not always
          # restore the binary itself, leaving binstall to skip install while
          # the binary is missing from PATH. --force sidesteps that.
          cargo binstall --no-confirm --force greentic-dev
          greentic-dev --version

      - name: Run coverage policy checks
        run: greentic-dev coverage
