name: Dev Publish crates (distributor-client)

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture

  publish:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1
      - run: |
          token=$(aws codeartifact get-authorization-token --domain ${{ secrets.CODEARTIFACT_DOMAIN }} --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} --region eu-north-1 --query authorizationToken --output text)
          echo "::add-mask::$token"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN=$token" >> $GITHUB_ENV
          export CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN="$token"
          endpoint=$(aws codeartifact get-repository-endpoint --domain ${{ secrets.CODEARTIFACT_DOMAIN }} --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} --repository greentic --format cargo --region eu-north-1 --query repositoryEndpoint --output text)
          mkdir -p .cargo
          printf '[registries.corp-artifacts-greentic]\nindex = "sparse+%s"\ncredential-provider = "cargo:token"\n' "$endpoint" > .cargo/config.toml
          base_version=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          dev_version="${base_version}-dev.${GITHUB_RUN_NUMBER}"
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${dev_version}\"/" Cargo.toml
          cargo publish -p greentic-distributor-client --registry corp-artifacts-greentic --allow-dirty
          sleep 5
          cargo publish -p greentic-distributor-dev --registry corp-artifacts-greentic --allow-dirty
